name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least privilege by default; the auto-merge job needs write to merge.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # The build gate: the phonotactic linter is the validator for every lexicon
  # entry, so its test suite must stay green. Zero dependencies — Node's
  # built-in type-stripping + test runner, no install step.
  test:
    name: Phonotactic linter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/phonotactic-linter
        run: npm test

  # The collision checker is the SECOND lexicon gate (docs/0000 §4); its suite
  # must stay green too. Zero dependencies, same as the linter.
  collision-tests:
    name: Collision checker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/collision-checker
        run: npm test

  # The parser/validator (docs/0002 grammar + 0005 §3) is a teaching aid and the
  # regression harness for the corpus; its suite must stay green too. Zero deps.
  parser-tests:
    name: Parser validator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/parser
        run: npm test

  # The book build validates every Talo example in "Teach Yourself Talo" through
  # the parser, so the course can never teach an ungrammatical sentence. Zero deps.
  book-check:
    name: Book examples validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate Talo examples
        working-directory: book
        run: npm run check

  # The corpus check is the fourth tool gate: it validates every Talo clause in
  # corpus/articles/ through the parser AND enforces that every content root is a
  # real lexicon entry or a declared proper noun — so the reading corpus can
  # never go ungrammatical or invent vocabulary. Zero deps.
  corpus-check:
    name: Corpus clauses validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate Talo corpus
        working-directory: corpus
        run: npm run check

  # The dictionary generator is the cross-file integrity gate for data/ (every
  # form legal, unique, badges consistent) and produces the published JSON the
  # web tool loads. Its suite must stay green. Zero deps.
  dictionary-tests:
    name: Dictionary integrity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: dictionary
        run: npm test

  # The site build assembles web/dist (landing page + book + lookup tool) and, in
  # doing so, rebuilds the dictionary and validates every book example. Verifying
  # it builds keeps the published GitHub Pages site from breaking. Zero deps.
  site-check:
    name: Site builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Assemble the site
        working-directory: web
        run: npm run build

  # Auto-merge a PR only when (a) the builds above passed AND (b) every changed
  # file is documentation. Code changes (anything outside docs / *.md / LICENSE)
  # are never auto-merged — they fall through to human review.
  auto-merge-docs:
    name: Auto-merge docs-only PRs
    needs: [test, collision-tests, parser-tests, book-check, corpus-check, dictionary-tests, site-check]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"
          echo "$files"
          docs_only=true
          if [ -z "$files" ]; then
            # No file changes -> nothing to merge automatically.
            docs_only=false
          fi
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md|LICENSE|LICENSE.*) ;;          # documentation -> ok
              *) docs_only=false ;;                       # any code -> needs review
            esac
          done <<< "$files"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "Result: docs_only=$docs_only"

      - name: Merge
        if: steps.classify.outputs.docs_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          echo "All changed files are documentation and the build passed — merging PR #$PR."
          gh pr merge "$PR" --squash --delete-branch
