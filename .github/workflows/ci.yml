name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least privilege by default; the auto-merge job needs write to merge.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # The build gate: the phonotactic linter is the validator for every lexicon
  # entry, so its test suite must stay green. Zero dependencies — Node's
  # built-in type-stripping + test runner, no install step.
  test:
    name: Phonotactic linter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/phonotactic-linter
        run: npm test

  # The collision checker is the SECOND lexicon gate (docs/0000 §4); its suite
  # must stay green too. Zero dependencies, same as the linter.
  collision-tests:
    name: Collision checker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/collision-checker
        run: npm test
      - name: Collision gate over the live lexicon (homophone / near-homophone /
          reserved / obscenity / false-friend)
        run: node --experimental-strip-types tools/collision-checker/src/cli.ts --lexicon data/lexicon.tsv

  # The morphological linter is the THIRD word-level gate (docs/0002 §3.1): it
  # validates the compounding buffer rule + morpheme seams, and gates the
  # generated layers (every compound/derived form must join legally from its
  # morphemes). Zero dependencies.
  morpho-tests:
    name: Morphological linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/morpho-linter
        run: npm test
      - name: Validate generated layers (morpheme seams)
        working-directory: tools/morpho-linter
        run: npm run check

  # The IPA renderer (docs/0001) backs the dictionary's pronunciation field; its
  # transcription must stay correct. Zero dependencies.
  ipa-tests:
    name: IPA renderer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/ipa
        run: npm test

  # The derivation explorer (docs/0007) is the dictionary's cross-reference layer
  # as a library + CLI: word families, near-homophone confusables, false-friend
  # notes. Its suite must stay green so the web lookup and CLI agree. Zero deps.
  derivation-tests:
    name: Derivation explorer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/derivation-explorer
        run: npm test

  # The SRS deck generator turns the dictionary's teachable core into a
  # spaced-repetition deck; its suite must stay green AND the deck must still
  # build cleanly from the committed dictionary.json. Zero dependencies.
  srs-tests:
    name: SRS deck generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/srs-generator
        run: npm test
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Validate the deck builds
        working-directory: tools/srs-generator
        run: npm run check

  # The interlinear glosser (docs/0002) auto-produces the morpheme gloss line; its
  # suite must stay green AND every corpus token must still gloss (--corpus is a
  # coverage gate over the reading corpus). Zero dependencies.
  glosser-tests:
    name: Interlinear glosser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/glosser
        run: npm test
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Gloss-coverage gate over the corpus
        working-directory: tools/glosser
        run: npm run check

  # Talo → English translator (rule-based transfer over parser + glosser).
  # Tests build the context from the committed dictionary.json and assert the
  # English transfer for representative sentences. Zero dependencies.
  translator-tests:
    name: Talo→English translator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Run tests
        working-directory: tools/translator
        run: npm test

  # Translation exercises: the graded bank must parse (every Talo sentence, real
  # roots) and the grader + generator suite must stay green. Zero dependencies.
  exercises-tests:
    name: Translation exercises
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Run tests
        working-directory: tools/exercises
        run: npm test
      - name: Validate the bank parses
        working-directory: tools/exercises
        run: npm run check

  # Coverage stats (docs/0003 §7b, 0006): its suite must stay green AND the data
  # must pass the cap gate — no donor family provably over ≤25%, every root
  # concept has a form. Zero dependencies.
  coverage-tests:
    name: Coverage stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/coverage-stats
        run: npm test
      - name: Coverage / cap gate over the data
        working-directory: tools/coverage-stats
        run: npm run check

  # The deprecation registry makes form-retirement a gated act: its suite must
  # stay green AND the data must pass (no retired spelling live again, every
  # recorded replacement live under its id). Zero dependencies.
  deprecation-tests:
    name: Deprecation registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/deprecation-registry
        run: npm test
      - name: Registry gate over the data
        working-directory: tools/deprecation-registry
        run: npm run check

  # The reading-coverage harness (docs/0013) measures lexicon coverage of the IDS
  # spine and emits the mint queue; its suite must stay green and the report must
  # generate cleanly from the committed reference + dictionary. Zero dependencies.
  reading-coverage-tests:
    name: Reading-coverage harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/reading-coverage
        run: npm test
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Coverage report generates
        working-directory: tools/reading-coverage
        run: npm run report

  # The parser/validator (docs/0002 grammar + 0005 §3) is a teaching aid and the
  # regression harness for the corpus; its suite must stay green too. Zero deps.
  parser-tests:
    name: Parser validator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: tools/parser
        run: npm test

  # The book build validates every Talo example in "Teach Yourself Talo" through
  # the parser, so the course can never teach an ungrammatical sentence. Zero deps.
  book-check:
    name: Book examples validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate Talo examples
        working-directory: book
        run: npm run check

  # The corpus check is the fourth tool gate: it validates every Talo clause in
  # corpus/articles/ through the parser AND enforces that every content root is a
  # real lexicon entry or a declared proper noun — so the reading corpus can
  # never go ungrammatical or invent vocabulary. Zero deps.
  corpus-check:
    name: Corpus clauses validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Validate Talo corpus
        working-directory: corpus
        run: npm run check

  # The dictionary generator is the cross-file integrity gate for data/ (every
  # form legal, unique, badges consistent) and produces the published JSON the
  # web tool loads. Its suite must stay green. Zero deps.
  dictionary-tests:
    name: Dictionary integrity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests
        working-directory: dictionary
        run: npm test

  # The site build assembles web/dist (landing page + book + lookup tool) and, in
  # doing so, rebuilds the dictionary and validates every book example. Verifying
  # it builds keeps the published GitHub Pages site from breaking. Zero deps.
  site-check:
    name: Site builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build the dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Assemble the site
        working-directory: web
        run: npm run build

  # Freshness gate: the committed GENERATED layers (derived lexicon, compounds,
  # dictionary JSON) must match a clean regeneration from data/. Catches a
  # lexicon/concepts/overrides edit committed without re-running the generators
  # (the "re-derive from the committed file" hazard, CLAUDE.md). The hand-curated
  # data/derived-overrides.tsv is an INPUT here, not regenerated.
  data-freshness:
    name: Generated data is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Regenerate derived layers + dictionary + exercise deck
        run: |
          node --experimental-strip-types scripts/derive-lexicon.mjs
          node --experimental-strip-types scripts/derive-compounds.mjs
          (cd dictionary && npm run build)
          (cd tools/exercises && npm run build)
      - name: Fail if the committed artifacts drifted
        run: git diff --exit-code -- data/derived-lexicon.tsv data/compounds.tsv dictionary/dist/dictionary.json data/exercises.json

  # Auto-merge a PR once every build job above has passed, when EITHER
  #   (a) it comes from an assistant `claude/*` branch — the maintainer has
  #       authorised merging these on green (CLAUDE.md "Git / PR workflow"), OR
  #   (b) it is docs-only.
  # Anything else (e.g. an external contributor's code PR) still waits for a human.
  auto-merge:
    name: Auto-merge green PRs
    needs: [test, collision-tests, morpho-tests, ipa-tests, derivation-tests, srs-tests, glosser-tests, translator-tests, exercises-tests, coverage-tests, deprecation-tests, reading-coverage-tests, parser-tests, book-check, corpus-check, dictionary-tests, site-check, data-freshness]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to auto-merge
        id: decide
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"; echo "$files"
          docs_only=true
          [ -z "$files" ] && docs_only=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md|LICENSE|LICENSE.*) ;;          # documentation -> ok
              *) docs_only=false ;;                       # any code
            esac
          done <<< "$files"
          merge=false
          case "$HEAD_REF" in
            claude/*) merge=true ;;                       # authorised assistant branch
          esac
          [ "$docs_only" = "true" ] && merge=true
          echo "merge=$merge" >> "$GITHUB_OUTPUT"
          echo "Result: head=$HEAD_REF docs_only=$docs_only merge=$merge"

      - name: Merge
        if: steps.decide.outputs.merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          echo "Build passed and PR #$PR is eligible — merging."
          gh pr merge "$PR" --squash --delete-branch
