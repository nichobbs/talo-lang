name: Deploy site to GitHub Pages

# Publishes the Talo site (landing page + book + word-lookup tool) to GitHub
# Pages on every push to main. The site is assembled from web/src, the generated
# dictionary JSON, and the rendered book — all zero-dependency, no install step.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "book/**"
      - "dictionary/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Regenerate dictionary data
        working-directory: dictionary
        run: npm run build
      - name: Assemble the site (builds + validates the book too)
        working-directory: web
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
